<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Edge</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="/Daily-task/project-barber-shop/flex.css">
</head>

<body>
    <div class="home">
        <!-- <img src="/Project barber shop/img/M bg.jpg" alt=""> -->
        <header>
            <div class="logo">
                <img src="/img/project-img/Royal logo.png" alt="Royal Edge logo">
            </div>
            <nav>
                <ul class="nav-link">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Contact</a></li>

                </ul>
            </nav>
            <div>
                <div class="btn">

                    <a href="#">Book Now</a>
                </div>
                <a id="add" href="#">

            <p class="flip">
